name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-checks:
    name: quick-checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run Jest
        run: npm test

      - name: Build Tailwind CSS
        run: npm run build:css

      - name: Verify generated CSS committed
        run: git diff --exit-code -- site/assets/css/output.css

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

  e2e:
    name: e2e (${{ matrix.project }})
    runs-on: ubuntu-latest
    needs: quick-checks
    timeout-minutes: 20
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        project:
          - chromium
          - firefox
          - webkit
          - mobile-chrome
          - mobile-safari
    env:
      CI: true
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      PW_PROJECT: ${{ matrix.project }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Playwright tests
        run: npm run test:e2e:ci -- --project="$PW_PROJECT"

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-${{ matrix.project }}
          path: |
            playwright-report/
            test-results/
          retention-days: 30

  deploy:
    name: deploy-pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - quick-checks
      - e2e
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  required-checks:
    name: required-checks
    if: always()
    needs:
      - quick-checks
      - e2e
    runs-on: ubuntu-latest
    steps:
      - name: Enforce required checks
        env:
          QUICK_CHECKS_RESULT: ${{ needs.quick-checks.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
        run: |
          if [[ "$QUICK_CHECKS_RESULT" != "success" ]]; then
            echo "quick-checks failed: $QUICK_CHECKS_RESULT"
            exit 1
          fi

          if [[ "$E2E_RESULT" != "success" ]]; then
            echo "e2e failed: $E2E_RESULT"
            exit 1
          fi

          echo "All required checks passed."
