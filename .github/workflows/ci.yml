name: Site CI

on:
  push:
    branches:
      - main
    paths:
      - 'site/index.html'
      - 'site/assets/**'
      - 'tests/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-checks:
    name: quick-checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run Jest
        run: npm test

      - name: Build Tailwind CSS
        run: npm run build:css

      - name: Verify generated CSS committed
        run: git diff --exit-code -- site/assets/css/output.css

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

  smoke-e2e:
    name: smoke-e2e (${{ matrix.project }})
    runs-on: ubuntu-latest
    needs: quick-checks
    if: github.event_name == 'push'
    timeout-minutes: 20
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        project:
          - chromium
          - mobile-chrome
    env:
      CI: true
      HOME: /root
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      PW_PROJECT: ${{ matrix.project }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Playwright tests
        run: npx playwright test --config=playwright.config.ts --project="$PW_PROJECT" --grep @smoke

        - name: Upload Playwright artifacts
          if: failure()
          uses: actions/upload-artifact@v7
          with:
            name: playwright-${{ matrix.project }}
            path: |
              playwright-report/
              test-results/
            retention-days: 30

  deploy:
    name: deploy-pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - quick-checks
      - smoke-e2e
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  required-checks:
    name: required-checks
    if: always()
    needs:
      - quick-checks
      - smoke-e2e
    runs-on: ubuntu-latest
    steps:
      - name: Enforce required checks
        env:
          QUICK_CHECKS_RESULT: ${{ needs.quick-checks.result }}
          SMOKE_E2E_RESULT: ${{ needs.smoke-e2e.result }}
        run: |
          if [[ "$QUICK_CHECKS_RESULT" != "success" ]]; then
            echo "quick-checks failed: $QUICK_CHECKS_RESULT"
            exit 1
          fi

          if [[ "$SMOKE_E2E_RESULT" != "success" && "$SMOKE_E2E_RESULT" != "skipped" ]]; then
            echo "smoke-e2e failed: $SMOKE_E2E_RESULT"
            exit 1
          fi

          echo "All required checks passed."
