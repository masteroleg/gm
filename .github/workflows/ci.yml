name: Site CI
on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/ci.yml'
      - 'tests/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
permissions:
  contents: read
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
concurrency:
  group: site-ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  quick-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build:css
      - run: git diff --exit-code -- site/assets/css/output.css
  smoke-e2e:
    runs-on: ubuntu-latest
    needs: quick-checks
    timeout-minutes: 20
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, mobile-chrome]
    env:
      CI: true
      HOME: /root
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      PW_PROJECT: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      - run: npx playwright test --config=playwright.config.ts --project="$PW_PROJECT" --grep @smoke
      - if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-${{ matrix.project }}
          path: |
            playwright-report/
            test-results/
          retention-days: 30
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [quick-checks, smoke-e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: ./site
      - id: deployment
        uses: actions/deploy-pages@v4
  required-checks:
    if: always()
    needs: [quick-checks, smoke-e2e]
    runs-on: ubuntu-latest
    steps:
      - env:
          QUICK_CHECKS_RESULT: ${{ needs.quick-checks.result }}
          SMOKE_E2E_RESULT: ${{ needs.smoke-e2e.result }}
        run: |
          if [[ "$QUICK_CHECKS_RESULT" != "success" ]]; then
            echo "quick-checks failed: $QUICK_CHECKS_RESULT"
            exit 1
          fi
          if [[ "$SMOKE_E2E_RESULT" != "success" && "$SMOKE_E2E_RESULT" != "skipped" ]]; then
            echo "smoke-e2e failed: $SMOKE_E2E_RESULT"
            exit 1
          fi
          echo "All required checks passed."
