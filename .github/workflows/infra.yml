name: Infra Checks

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - '.husky/**'
      - 'scripts/has-site-impact.sh'
      - 'scripts/generate-commit-msg.cjs'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - '.husky/**'
      - 'scripts/has-site-impact.sh'
      - 'scripts/generate-commit-msg.cjs'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: infra-checks-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  infra-checks:
    name: infra-checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Validate husky scripts
        run: |
          bash -n .husky/pre-commit
          bash -n .husky/pre-push
          if [ -f .husky/prepare-commit-msg ]; then bash -n .husky/prepare-commit-msg; fi

      - name: Validate site impact helper
        run: bash -n scripts/has-site-impact.sh

      - name: Validate commit message generator
        run: |
          node --check scripts/generate-commit-msg.cjs
          node scripts/generate-commit-msg.cjs --self-test three >/tmp/commit-msg-three.txt
          node scripts/generate-commit-msg.cjs --self-test cssRefactor >/tmp/commit-msg-css-refactor.txt
