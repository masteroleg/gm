name: Site Full Regression

on:
  pull_request:
    branches:
      - main
    paths:
      - 'site/index.html'
      - 'site/assets/**'
      - 'tests/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-full-regression-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quick-checks:
    name: quick-checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run Jest
        run: npm test

      - name: Build Tailwind CSS
        run: npm run build:css

      - name: Verify generated CSS committed
        run: git diff --exit-code -- site/assets/css/output.css

  full-e2e:
    name: full-e2e (${{ matrix.project }})
    runs-on: ubuntu-latest
    needs: quick-checks
    timeout-minutes: 20
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        project:
          - chromium
          - firefox
          - webkit
          - mobile-chrome
          - mobile-safari
    env:
      CI: true
      HOME: /root
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      PW_PROJECT: ${{ matrix.project }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Playwright tests
        run: npm run test:e2e:ci -- --project="$PW_PROJECT"

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ matrix.project }}
          path: |
            playwright-report/
            test-results/
          retention-days: 30